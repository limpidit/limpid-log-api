services:
  - type: web
    name: limpid-log-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: limpid-log-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: limpid-log-db
    plan: free
    databaseName: limpidlogs
    user: limpidlogs
